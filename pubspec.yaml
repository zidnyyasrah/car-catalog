name: carcat
description: "Car Catalogue Indonesia - Browse cars available in Indonesia"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  supabase_flutter: ^2.12.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

# app_links 6.4.0 introduced flutter.compileSdkVersion which breaks AGP 8.3.x
dependency_overrides:
  app_links: '>=6.0.0 <6.4.0'
